# ─────────────────────────────────────────────────────────────────────────────
#  Auto-deploy to Hostinger on every push to main
#
#  Required GitHub Secrets (Settings → Secrets and variables → Actions):
#    HOSTINGER_SSH_PASS   — SSH password: deltaDragon@786
#    DATABASE_URL         — e.g. file:./prod.db  or  mysql://...
#    NEXTAUTH_SECRET      — random 32-char string
#    NEXTAUTH_URL         — https://yourdomain.com
#    DROPBOX_APP_KEY      — from Dropbox developer console
#    DROPBOX_APP_SECRET   — from Dropbox developer console
#    DROPBOX_REFRESH_TOKEN
#    SMTP_HOST            — smtp.office365.com
#    SMTP_PORT            — 587
#    SMTP_USER            — priti@goldendollarconsulting.com
#    SMTP_PASS            — Outlook app password
#    SMTP_FROM            — "Golden Dollar Consultancy <priti@goldendollarconsulting.com>"
#    SUPPORT_EMAIL        — itsupport@goldendollarconsulting.com
# ─────────────────────────────────────────────────────────────────────────────

name: 🚀 Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  SSH_HOST: 5.183.10.106
  SSH_PORT: 65002
  SSH_USER: u469500580
  APP_DIR:  ~/domains/goldendollarconsulting.com/nodejs

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ───────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build + package (createDeployment.cjs runs `npm run build` + zip)
      - name: Build & create deployment ZIP
        run: node scripts/createDeployment.cjs
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET:       ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL:          ${{ secrets.NEXTAUTH_URL }}
          DROPBOX_APP_KEY:       ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET:    ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          SMTP_FROM:             ${{ secrets.SMTP_FROM }}
          SUPPORT_EMAIL:         ${{ secrets.SUPPORT_EMAIL }}

      # ── 5. Install sshpass on the runner ───────────────────────────────────
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      # ── 6. Upload ZIP to Hostinger via SCP ─────────────────────────────────
      - name: Upload gdc-deploy.zip to server
        env:
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
        run: |
          sshpass -p "$SSH_PASS" scp \
            -P "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            gdc-deploy.zip \
            "$SSH_USER@$SSH_HOST:~/gdc-deploy.zip"

      # ── 7. Deploy on the Hostinger server ──────────────────────────────────
      - name: Deploy on Hostinger
        env:
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$SSH_HOST" bash << 'REMOTE'
          set -e

          APP_DIR="$HOME/domains/goldendollarconsulting.com/nodejs"
          ZIP="$HOME/gdc-deploy.zip"

          echo "──────────────────────────────────────────"
          echo " GDC Deploy  $(date '+%Y-%m-%d %H:%M:%S')"
          echo " Target: $APP_DIR"
          echo "──────────────────────────────────────────"

          # Preserve .env files — they live on the server and must not be wiped
          echo ">>> Preserving .env files..."
          mkdir -p /tmp/gdc-env-backup
          cp "$APP_DIR/.env" /tmp/gdc-env-backup/.env 2>/dev/null || true
          cp "$APP_DIR/.env.local" /tmp/gdc-env-backup/.env.local 2>/dev/null || true

          # Extract new build directly into app dir (unzip -o overwrites files)
          echo ">>> Extracting new deployment into $APP_DIR..."
          mkdir -p "$APP_DIR"
          unzip -o "$ZIP" -d "$APP_DIR"
          cd "$APP_DIR"

          # Restore .env files
          echo ">>> Restoring .env files..."
          cp /tmp/gdc-env-backup/.env "$APP_DIR/.env" 2>/dev/null || true
          cp /tmp/gdc-env-backup/.env.local "$APP_DIR/.env.local" 2>/dev/null || true
          rm -rf /tmp/gdc-env-backup

          # Install Linux-native production packages (Prisma needs Linux binary)
          echo ">>> Installing production dependencies..."
          npm install --omit=dev --no-optional 2>&1 | tail -8

          # Generate Prisma client for Linux
          echo ">>> Generating Prisma client..."
          npx prisma generate 2>&1 | tail -4

          # Run any pending DB migrations
          echo ">>> Running DB migrations..."
          npx prisma migrate deploy 2>&1 | tail -4 || true

          # Restart via LiteSpeed (Hostinger) — touch tmp/restart.txt
          echo ">>> Triggering LiteSpeed Node.js restart..."
          mkdir -p "$APP_DIR/tmp"
          touch "$APP_DIR/tmp/restart.txt"
          echo "    ✓ restart.txt touched — LiteSpeed will reload the app"

          # Clean up uploaded ZIP
          rm -f "$ZIP"

          echo "──────────────────────────────────────────"
          echo " ✅ Deployment complete!"
          echo "──────────────────────────────────────────"
          REMOTE
